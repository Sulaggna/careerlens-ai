# Application
spring.application.name=CareerLens AI Backend
server.port=8080

# MySQL Database
spring.datasource.url=jdbc:mysql://localhost:3306/careerlens_db?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=Sulagna@2004
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# JWT
jwt.secret=CareerLensAI2026SecretKeyForJWTTokenGenerationMustBeAtLeast256BitsLong!!
jwt.expiration=86400000

# File Upload
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
file.upload-dir=uploads/resumes

# Logging
logging.level.com.careerlens=DEBUG
logging.level.org.springframework.security=INFO
